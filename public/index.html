<!DOCTYPE html>
<html>
<head>
  <title>V4 Sign Demo</title>
</head>
<body>

<h2>🧪 V4 TP签名实验</h2>

<button onclick="connect()">连接钱包</button>
<button onclick="sign()" id="signBtn">生成签名</button>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;

async function connect() {

  // ❗不要直接拦死
  if (!window.ethereum && !window.tp && !window.web3) {
    alert("请用TP或MetaMask打开");
    return;
  }

  const provider = window.ethereum || window.tp || window.web3;

  try {
    const accounts = await provider.request({
      method: "eth_requestAccounts"
    });

    alert("连接成功: " + accounts[0]);

  } catch (e) {
    alert("连接失败");
  }
}

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();

  alert("钱包已连接");
}

async function sign() {
  if (!signer) {
    alert("请先连接钱包");
    return;
  }

  const addr = await signer.getAddress();

  alert("当前钱包：" + addr);
}
</script>

</body>
</html>
