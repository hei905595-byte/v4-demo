<!DOCTYPE html>
<html>
<head>
  <title>V4 Sign Demo</title>
</head>
<body>

<h2>🧪 V4 TP签名实验</h2>

<button onclick="connect()">连接钱包</button>
<button onclick="sign()" id="signBtn">生成签名</button>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;

async function connect() {
  let accounts;
  try {
    // 区分TP钱包和通用MetaMask类钱包
    if (window.tp && window.tp.isTokenPocket) {
      // TP钱包专用逻辑
      accounts = await window.tp.request({
        method: "eth_requestAccounts"
      });
      provider = new ethers.providers.Web3Provider(window.tp);
    } else if (window.ethereum && window.ethereum.request) {
      // 普通以太坊钱包
      accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });
      provider = new ethers.providers.Web3Provider(window.ethereum);
    } else {
      alert("请在TP钱包DApp浏览器打开页面");
      return;
    }

    // 必须请求授权，获取签名者
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const userAddr = await signer.getAddress();
    alert("连接成功: " + userAddr);

  } catch (e) {
    alert("连接失败: " + (e.message || e));
    console.error(e);
  }
}

async function sign() {
  if (!signer) {
    alert("请先连接钱包");
    return;
  }
  const addr = await signer.getAddress();
  alert("当前钱包地址：" + addr);
}
</script>

</body>
</html>
