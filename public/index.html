<!DOCTYPE html>
<html>
<head>
  <title>V4 Sign Demo</title>
</head>
<body>

<h2>🧪 V4 TP签名实验</h2>

<button onclick="connect()">连接钱包</button>
<button onclick="sign()" id="signBtn">生成签名</button>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;

// 等待window.ethereum注入完成
async function waitEthereum() {
  let count = 0;
  while (!window.ethereum && count < 20) {
    await new Promise(resolve => setTimeout(resolve, 100));
    count++;
  }
  return window.ethereum;
}

async function connect() {
  try {
    // 循环等待钱包注入对象
    const eth = await waitEthereum();
    if (!eth) {
      alert("钱包注入失败，请刷新页面重试");
      return;
    }
    // 请求授权账号
    const accounts = await eth.request({
      method: "eth_requestAccounts"
    });
    provider = new ethers.providers.Web3Provider(eth);
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    alert("连接成功：" + addr);
  } catch (e) {
    alert("连接失败：" + e.message);
    console.error(e);
  }
}

async function sign() {
  if (!signer) {
    alert("请先连接钱包");
    return;
  }
  const addr = await signer.getAddress();
  alert("当前钱包地址：" + addr);
}
</script>

</body>
</html>
