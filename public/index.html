<!DOCTYPE html>
<html>
<head>
  <title>V4 Multi-Chain Sign Demo</title>
</head>
<body>

<h2>🧪 TP 多链签名实验（EVM+波场）</h2>
<button onclick="connect()">连接钱包</button>
<button onclick="sign()" id="signBtn">获取地址&签名</button>

<!-- EVM 库 -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;
let chainType = ""; // evm / tron

// 等待注入对象加载
async function waitInject() {
  let count = 0;
  while (count < 25) {
    if (window.ethereum) {
      chainType = "evm";
      return window.ethereum;
    }
    if (window.tronWeb && window.tronWeb.ready) {
      chainType = "tron";
      return window.tronWeb;
    }
    await new Promise(r => setTimeout(r, 100));
    count++;
  }
  return null;
}

async function connect() {
  try {
    const injectObj = await waitInject();
    if (!injectObj) {
      alert("未检测到钱包，请在TP DApp浏览器打开，切换ETH/BSC/波场");
      return;
    }

    if (chainType === "evm") {
      // EVM 以太坊/BSC逻辑
      const accounts = await injectObj.request({ method: "eth_requestAccounts" });
      provider = new ethers.providers.Web3Provider(injectObj);
      signer = provider.getSigner();
      const addr = await signer.getAddress();
      alert(`EVM链连接成功：${addr}`);
    } else if (chainType === "tron") {
      // 波场TRON逻辑
      const addr = injectObj.defaultAddress.base58;
      alert(`波场链连接成功：${addr}`);
    }
  } catch (e) {
    alert("连接失败：" + (e.message || e));
    console.error(e);
  }
}

async function sign() {
  if (!chainType) {
    alert("请先连接钱包");
    return;
  }
  const signText = "V4 TP签名测试文本";
  if (chainType === "evm") {
    const addr = await signer.getAddress();
    const signature = await signer.signMessage(signText);
    alert(`EVM地址：${addr}\n签名内容：${signText}\n签名结果：${signature}`);
  } else if (chainType === "tron") {
    const addr = window.tronWeb.defaultAddress.base58;
    const signature = await window.tronWeb.trx.signMessage(signText);
    alert(`波场地址：${addr}\n签名内容：${signText}\n签名结果：${signature}`);
  }
}
</script>

</body>
</html>
